                                    <CatalogGrid onSelect={setActiveSub} />
                                )}
                            </main>
                        </div>

                        <div className="md:hidden p-4 bg-gray-100 text-center text-xs text-gray-500 border-t border-gray-300">
                            © 2025 McStudent-Carr Supply Co.
                        </div>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(<App />);
        </script>
    </body>
</html>
