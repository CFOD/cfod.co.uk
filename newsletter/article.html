<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Default meta — overwritten by JS once article loads -->
    <title>Global Stratum</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Deep-layer analysis on international relations, geopolitics, and global policy." id="meta-desc" />

    <!-- Open Graph (populated by JS) -->
    <meta property="og:site_name" content="Global Stratum" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="Global Stratum" id="og-title" />
    <meta property="og:description" content="" id="og-desc" />
    <meta property="og:image" content="" id="og-image" />
    <meta property="og:url" content="" id="og-url" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="" id="tw-title" />
    <meta name="twitter:description" content="" id="tw-desc" />
    <meta name="twitter:image" content="" id="tw-image" />

    <!-- JSON-LD structured data (populated by JS) -->
    <script type="application/ld+json" id="jsonld">{}</script>

    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script>
        const ADMIN_EMAIL = "connor-odonnell@hotmail.co.uk";
        window.siteConfig = {
            apiKey: "AIzaSyAQDrbejR6PTnKd9fpH7asHvLRKSaCVvvk",
            authDomain: "global-stratum.firebaseapp.com",
            projectId: "global-stratum",
            storageBucket: "global-stratum.firebasestorage.app",
            messagingSenderId: "291491694109",
            appId: "1:291491694109:web:e808b699d3fb6cb2c9a8f4",
            measurementId: "G-6SRT0XEHCN"
        };
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg:       #1b1f22;
            --bg-card:  #20252a;
            --accent:   #4db6ac;
            --border:   rgba(255,255,255,0.1);
            --text:     #e8e8e8;
            --muted:    rgba(255,255,255,0.45);
            --serif:    'Playfair Display', Georgia, serif;
            --sans:     'Source Sans Pro', sans-serif;
        }

        html { scroll-behavior: smooth; }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-weight: 300;
            font-size: 17px;
            line-height: 1.7;
        }

        /* ── NAV ── */
        nav.site-nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(27,31,34,0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between;
            height: 3.5rem;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 0.6rem;
            text-decoration: none; color: #fff;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3rem;
        }
        .nav-brand i { color: var(--accent); font-size: 1rem; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
        .nav-links a {
            text-decoration: none; color: var(--muted);
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #fff; }
        #nav-login-btn {
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2rem;
            padding: 0.35rem 0.9rem; border-radius: 2px; cursor: pointer;
            font-family: var(--sans); transition: 0.2s;
        }
        #nav-login-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── HERO ── */
        .hero {
            width: 100%; max-height: 60vh; overflow: hidden;
            position: relative; background: #2a2f35;
        }
        .hero img {
            width: 100%; height: 100%; object-fit: cover;
            display: block; opacity: 0.85;
            max-height: 60vh;
        }
        .hero::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(27,31,34,0) 40%, rgba(27,31,34,0.9) 100%);
        }

        /* ── ARTICLE LAYOUT ── */
        .article-wrap {
            max-width: 42rem; margin: 0 auto;
            padding: 3rem 1.5rem 5rem;
        }

        /* Category badge */
        .category-badge {
            display: inline-block;
            font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.25rem;
            color: var(--accent); border: 1px solid var(--accent);
            padding: 3px 10px; border-radius: 2px;
            margin-bottom: 1.25rem;
        }

        /* Headline */
        .article-headline {
            font-family: var(--serif);
            font-size: clamp(1.75rem, 4vw, 2.75rem);
            font-weight: 700; font-style: italic;
            line-height: 1.2; color: #fff;
            margin: 0 0 1rem;
        }

        /* Byline */
        .article-byline {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2rem;
            color: var(--muted); margin-bottom: 2.5rem;
            display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
        }
        .byline-sep { opacity: 0.3; }

        /* Divider */
        .rule {
            border: none; border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* Lede */
        .article-lede {
            font-family: var(--sans);
            font-size: 1.2rem; font-weight: 400; font-style: italic;
            color: rgba(255,255,255,0.85); line-height: 1.65;
            margin-bottom: 2.5rem;
            padding-left: 1.25rem;
            border-left: 3px solid var(--accent);
        }

        /* Body paragraphs */
        .article-body p {
            font-size: 1.05rem; line-height: 1.8;
            color: rgba(255,255,255,0.82);
            margin: 0 0 1.75rem;
        }
        .article-body p:last-child { margin-bottom: 0; }

        /* Pull quote */
        .pull-quote {
            margin: 2.75rem 0;
            padding: 1.75rem 2rem;
            border-top: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent);
            background: rgba(77,182,172,0.06);
            border-radius: 2px;
        }
        .pull-quote p {
            font-family: var(--serif);
            font-size: 1.35rem; font-style: italic; font-weight: 700;
            color: #fff; line-height: 1.5; margin: 0;
            text-align: center;
        }

        /* ── FOOTER BAR ── */
        .article-footer {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem;
            padding-top: 2rem; margin-top: 3rem;
            border-top: 1px solid var(--border);
        }
        .back-link {
            text-decoration: none; color: var(--muted);
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2rem;
            transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem;
        }
        .back-link:hover { color: var(--accent); }
        .share-links { display: flex; gap: 0.75rem; }
        .share-btn {
            text-decoration: none; color: var(--muted);
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15rem;
            border: 1px solid var(--border); padding: 0.35rem 0.85rem; border-radius: 2px;
            transition: 0.2s; display: flex; align-items: center; gap: 0.4rem;
        }
        .share-btn:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
        .share-btn i { font-size: 0.8rem; }

        /* ── ADMIN EDIT BUTTON ── */
        #admin-edit {
            display: none;
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
            background: var(--accent); color: #1b1f22;
            border: none; border-radius: 3px; cursor: pointer;
            font-family: var(--sans); font-size: 0.65rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.2rem;
            padding: 0.6rem 1.25rem; transition: background 0.2s;
        }
        #admin-edit:hover { background: #5ecfc4; }

        /* ── LOADING / ERROR ── */
        #loading-state {
            min-height: 60vh; display: flex; align-items: center; justify-content: center;
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.08); border-top: 2px solid var(--accent);
            border-radius: 50%; width: 32px; height: 32px;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state {
            text-align: center; padding: 5rem 2rem;
        }
        .error-state h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--muted); }
        .error-state a { color: var(--accent); text-decoration: none; }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            nav.site-nav { padding: 0 1rem; }
            .article-wrap { padding: 2rem 1.25rem 4rem; }
            .pull-quote { padding: 1.25rem 1.5rem; }
            .pull-quote p { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="site-nav">
    <a href="/" class="nav-brand">
        <i class="fas fa-globe-americas"></i>
        Global Stratum
    </a>
    <div class="nav-links">
        <a href="/">Archive</a>
        <button id="nav-login-btn">Login</button>
    </div>
</nav>

<!-- HERO IMAGE -->
<div class="hero" id="hero" style="display:none;">
    <img id="hero-img" src="" alt="">
</div>

<!-- MAIN CONTENT -->
<main>
    <!-- Loading -->
    <div id="loading-state"><div class="loader"></div></div>

    <!-- Article (hidden until loaded) -->
    <div class="article-wrap" id="article-wrap" style="display:none;">
        <span class="category-badge" id="art-category"></span>
        <h1 class="article-headline" id="art-title"></h1>
        <div class="article-byline">
            <span id="art-date"></span>
            <span class="byline-sep">|</span>
            <span id="art-readtime"></span>
            <span class="byline-sep">|</span>
            <span style="color:var(--accent);">Global Stratum</span>
        </div>
        <hr class="rule">
        <p class="article-lede" id="art-lede" style="display:none;"></p>
        <div class="article-body" id="art-body"></div>
        <div class="pull-quote" id="art-pullquote" style="display:none;">
            <p id="art-pullquote-text"></p>
        </div>
        <div class="article-footer">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Archive</a>
            <div class="share-links">
                <a class="share-btn" id="share-x" href="#" target="_blank" rel="noopener">
                    <i class="fab fa-x-twitter"></i> Share
                </a>
                <a class="share-btn" id="share-li" href="#" target="_blank" rel="noopener">
                    <i class="fab fa-linkedin-in"></i> Share
                </a>
            </div>
        </div>
    </div>

    <!-- Error -->
    <div class="error-state" id="error-state" style="display:none;">
        <h1>Article not found</h1>
        <p style="color:var(--muted);font-size:0.85rem;">This article may have been removed or the URL is incorrect.</p>
        <a href="/">← Return to archive</a>
    </div>
</main>

<!-- Floating admin edit -->
<button id="admin-edit">Edit Article</button>

<script type="module">
    import { initializeApp }          from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, limit }
                                      from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ── INIT ──────────────────────────────────────────────────────────────────
    const app       = initializeApp(window.siteConfig);
    const analytics = getAnalytics(app);
    const auth      = getAuth(app);
    const db        = getFirestore(app);

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function getSlug() {
        // Supports /article/my-slug (via .htaccess) or ?slug=my-slug or ?id=xxx
        const path = window.location.pathname;
        const m = path.match(/\/article\/(.+)$/);
        if (m) return { type: 'slug', val: decodeURIComponent(m[1]) };
        const p = new URLSearchParams(window.location.search);
        if (p.get('slug')) return { type: 'slug', val: p.get('slug') };
        if (p.get('id'))   return { type: 'id',   val: p.get('id') };
        return null;
    }

    function readingTime(text) {
        return Math.max(1, Math.ceil((text || '').split(/\s+/).length / 200));
    }

    function formatDate(ts) {
        return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function setMeta(article) {
        const url  = `https://newsletter.cfod.co.uk/article/${article.slug}`;
        const desc = article.lede || article.summary || '';

        document.title = `${article.title} | Global Stratum`;
        document.getElementById('meta-desc').content  = desc;
        document.getElementById('og-title').content   = article.title;
        document.getElementById('og-desc').content    = desc;
        document.getElementById('og-image').content   = article.imageUrl || '';
        document.getElementById('og-url').content     = url;
        document.getElementById('tw-title').content   = article.title;
        document.getElementById('tw-desc').content    = desc;
        document.getElementById('tw-image').content   = article.imageUrl || '';

        document.getElementById('jsonld').textContent = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "Article",
            "headline": article.title,
            "description": desc,
            "image": article.imageUrl || '',
            "datePublished": new Date(article.createdAt).toISOString(),
            "dateModified": new Date(article.updatedAt || article.createdAt).toISOString(),
            "author": { "@type": "Organization", "name": "Global Stratum" },
            "publisher": {
                "@type": "Organization", "name": "Global Stratum",
                "url": "https://newsletter.cfod.co.uk"
            },
            "url": url,
            "articleSection": article.category || 'Analysis'
        });
    }

    function categoryColor(cat) {
        const map = {
            'Geopolitics': '#4db6ac', 'Policy': '#81c784', 'Analysis': '#64b5f6',
            'Conflict': '#e57373',    'Economics': '#ffb74d', 'Intelligence': '#ba68c8'
        };
        return map[cat] || '#4db6ac';
    }

    function renderArticle(article) {
        // Set SEO meta
        setMeta(article);

        // Hero image
        if (article.imageUrl) {
            const hero = document.getElementById('hero');
            document.getElementById('hero-img').src = article.imageUrl;
            document.getElementById('hero-img').alt = article.title;
            hero.style.display = 'block';
        }

        // Category badge
        const catEl = document.getElementById('art-category');
        catEl.textContent = article.category || 'Analysis';
        catEl.style.color = categoryColor(article.category);
        catEl.style.borderColor = categoryColor(article.category);

        // Headline
        document.getElementById('art-title').textContent = article.title;

        // Byline
        document.getElementById('art-date').textContent    = formatDate(article.createdAt);
        document.getElementById('art-readtime').textContent = `${readingTime(article.body || article.content || '')} min read`;

        // Lede
        const lede = article.lede;
        if (lede) {
            const ledeEl = document.getElementById('art-lede');
            ledeEl.textContent = lede;
            ledeEl.style.display = 'block';
        }

        // Body — split on double newlines into paragraphs
        const rawBody = article.body || article.content || '';
        const paragraphs = rawBody.split(/\n\n+/).filter(p => p.trim());
        const bodyHtml = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        document.getElementById('art-body').innerHTML = bodyHtml;

        // Pull quote (inserted after second paragraph if it exists)
        if (article.pullQuote) {
            const pqEl = document.getElementById('art-pullquote');
            document.getElementById('art-pullquote-text').textContent = `"${article.pullQuote}"`;
            pqEl.style.display = 'block';
            // Move pull quote after 2nd paragraph in the body
            const bodyEl = document.getElementById('art-body');
            const paras  = bodyEl.querySelectorAll('p');
            if (paras.length > 2) {
                paras[1].after(pqEl);
            } else {
                bodyEl.after(pqEl);
            }
        }

        // Share links
        const pageUrl = encodeURIComponent(`https://newsletter.cfod.co.uk/article/${article.slug}`);
        const pageTitle = encodeURIComponent(article.title);
        document.getElementById('share-x').href  = `https://twitter.com/intent/tweet?text=${pageTitle}&url=${pageUrl}`;
        document.getElementById('share-li').href = `https://www.linkedin.com/sharing/share-offsite/?url=${pageUrl}`;

        // Show article, hide loader
        document.getElementById('loading-state').style.display  = 'none';
        document.getElementById('article-wrap').style.display   = 'block';

        // GA4 event
        logEvent(analytics, 'article_view', {
            article_slug:     article.slug || '',
            article_title:    article.title,
            article_category: article.category || 'Analysis'
        });
    }

    // ── FETCH ─────────────────────────────────────────────────────────────────
    async function loadArticle() {
        const ref = getSlug();
        if (!ref) { showError(); return; }

        try {
            let article = null;

            if (ref.type === 'slug') {
                const q   = query(collection(db, 'articles'), where('slug', '==', ref.val), limit(1));
                const snap = await getDocs(q);
                if (!snap.empty) article = { id: snap.docs[0].id, ...snap.docs[0].data() };
            } else {
                // Fallback: fetch by doc id (backward compat for old hash links)
                const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                const d = await getDoc(doc(db, 'articles', ref.val));
                if (d.exists()) article = { id: d.id, ...d.data() };
            }

            if (!article) { showError(); return; }
            renderArticle(article);

            // Admin controls
            onAuthStateChanged(auth, user => {
                if (user?.email === ADMIN_EMAIL) {
                    const editBtn = document.getElementById('admin-edit');
                    editBtn.style.display = 'block';
                    editBtn.onclick = () => { window.location = `/?#edit/${article.id}`; };
                }
                document.getElementById('nav-login-btn').textContent = user ? 'Dashboard' : 'Login';
                document.getElementById('nav-login-btn').onclick = () => { window.location = user ? '/#login' : '/#login'; };
            });

        } catch(e) {
            console.error(e);
            showError();
        }
    }

    function showError() {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('error-state').style.display   = 'block';
    }

    // ── NAV LOGIN ─────────────────────────────────────────────────────────────
    document.getElementById('nav-login-btn').onclick = () => { window.location = '/#login'; };

    loadArticle();
</script>
</body>
</html>
