<!doctype html>
<html lang="en" class="scroll-smooth">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CFOD - Home</title>
        <link
            rel="icon"
            type="image/png"
            href="https://placehold.co/32x32/374151/FFF?text=C&font=sans-serif"
        />

        <!-- Load Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Load Fonts & Icons -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <script
            src="https://kit.fontawesome.com/0b745d7406.js"
            crossorigin="anonymous"
        ></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ["Inter", "sans-serif"],
                            montserrat: ["Montserrat", "sans-serif"],
                        },
                        colors: {
                            primary: {
                                600: "#374151",
                                700: "#1f2937",
                                800: "#111827",
                            },
                        },
                    },
                },
            };
        </script>

        <style>
            .loader {
                border: 3px solid #f3f3f3;
                border-top: 3px solid #374151;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                animation: spin 1s linear infinite;
                display: inline-block;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            /* Markdown-ish styling for dynamic article content */
            .prose p {
                margin-bottom: 1.5em;
                line-height: 1.8;
            }
            .prose h2 {
                font-size: 1.5em;
                font-weight: bold;
                margin-top: 2em;
                margin-bottom: 1em;
                color: #111827;
            }
            .prose ul {
                list-style-type: disc;
                padding-left: 1.5em;
                margin-bottom: 1.5em;
            }
            .prose blockquote {
                border-left: 4px solid #e5e7eb;
                padding-left: 1em;
                font-style: italic;
                color: #4b5563;
            }
            .fade-in {
                animation: fadeIn 0.3s ease-in;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body
        class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen flex flex-col"
    >
        <!-- Header -->
        <header
            class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm"
        >
            <nav
                class="container mx-auto px-6 py-4 flex justify-between items-center"
            >
                <div class="flex items-center gap-4">
                    <a
                        href="#"
                        onclick="window.location.hash=''; return false;"
                        class="text-2xl font-bold text-gray-900 hover:text-primary-700 transition-colors tracking-tight"
                        >CFOD</a
                    >
                    <span
                        id="admin-badge"
                        class="hidden bg-red-100 text-red-800 text-xs font-bold px-2 py-1 rounded uppercase tracking-wider"
                        >Staff Mode</span
                    >
                </div>

                <div class="flex items-center space-x-6">
                    <!-- Navigation -->
                    <div class="hidden md:flex space-x-6">
                        <a
                            href="#"
                            onclick="window.location.hash=''; return false;"
                            class="text-base font-medium text-gray-600 hover:text-primary-700 transition-colors"
                            >HOME</a
                        >
                        <a
                            href="./about-me.html"
                            class="text-base font-medium text-gray-600 hover:text-primary-700 transition-colors"
                            >ABOUT ME</a
                        >
                    </div>

                    <!-- Admin Action Button -->
                    <button
                        id="new-post-btn"
                        onclick="window.location.hash='#submit'"
                        class="hidden flex items-center gap-2 bg-black text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-800 transition-colors"
                    >
                        <i class="fa-solid fa-pen-nib"></i> New Post
                    </button>
                </div>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main
            id="main-container"
            class="container mx-auto px-6 py-12 flex-grow"
        >
            <!-- Views will be injected here via JavaScript -->
            <div id="loading-view" class="text-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-gray-500">Connecting to Live Database...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-gray-900 text-gray-300 mt-auto">
            <div
                class="container mx-auto px-6 py-12 flex flex-col md:flex-row justify-between items-center"
            >
                <div class="mb-6 md:mb-0">
                    <span class="text-2xl font-bold text-white">CFOD</span>
                    <p class="text-sm text-gray-400 mt-1">&copy; 2025 CFOD.</p>
                </div>
                <div
                    class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-8"
                >
                    <div id="auth-links">
                        <!-- Dynamic Login/Logout Link -->
                        <a
                            href="#login"
                            class="text-xs font-bold text-gray-500 hover:text-white uppercase transition-colors"
                            >Staff Login</a
                        >
                    </div>
                    <a
                        href="mailto:connor-odonnell@hotmail.co.uk"
                        class="flex items-center justify-center bg-primary-700 text-white px-4 py-2 rounded-lg hover:bg-primary-800 transition-colors text-sm font-medium"
                    >
                        <i class="fa-regular fa-envelope mr-2"></i> CONTACT
                    </a>
                </div>
            </div>
        </footer>

        <!-- LOGIC -->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
            import {
                getAuth,
                onAuthStateChanged,
                signInWithEmailAndPassword,
                signOut,
                setPersistence,
                browserLocalPersistence,
            } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
            import {
                getFirestore,
                collection,
                addDoc,
                onSnapshot,
                doc,
                query,
                orderBy,
                limit,
                serverTimestamp,
            } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

            // CONFIGURATION (Forcing Live Connection)
            const firebaseConfig = {
                apiKey: "AIzaSyBjyAYAyQI4rGQviWbH1Dx8o2hFoe7jAS4",
                authDomain: "jc-journal.firebaseapp.com",
                projectId: "jc-journal",
                storageBucket: "jc-journal.firebasestorage.app",
                messagingSenderId: "931803753012",
                appId: "1:931803753012:web:fce867abf6794c180ff861",
            };

            // --- LEGACY CONTENT ---
            const legacyArticles = [
                {
                    id: "legacy-1",
                    type: "standard",
                    source: "Portfolio",
                    date: "2024-02-15",
                    imageUrl: "./imgs/kosovo-header.jpg",
                    title: "A Bipolar Exploration of Kosovo",
                    description:
                        "The reasoning behind my visit to Kosovo is admittedly rather vague. There have been many times in life where I have been bestowed with a small sum of money...",
                    linkUrl: "./kosovo.html",
                    isLegacy: true,
                },
                {
                    id: "legacy-2",
                    type: "standard",
                    source: "Portfolio",
                    date: "2024-01-20",
                    imageUrl: "./imgs/books_2.jpg",
                    title: 'Essay - "The Changing Nature of War"',
                    description:
                        "Throughout the 21st century, video games, memes and social media have become a mainstream part of culture and society.",
                    linkUrl: "./changing-nature-of-war.html",
                    isLegacy: true,
                },
                {
                    id: "legacy-3",
                    type: "standard",
                    source: "Portfolio",
                    date: "2023-10-05",
                    imageUrl: "./imgs/rishi_sunak.jpg",
                    title: "UK Political Uncertainty Ahead of 2024...",
                    description:
                        "As the UK gears up for the 2024 general election, a recent article regarding a YouGov poll published by The Telegraph has ignited speculation...",
                    linkUrl: "./rishi-story.html",
                    isLegacy: true,
                },
            ];

            let app, auth, db;
            let currentUser = null;
            let unifiedFeed = [];
            let displayedCount = 6;
            let currentView = "home";

            let unsubCfod = null;
            let unsubJc = null;
            let feedError = null;

            // --- APP INITIALIZATION ---
            async function init() {
                try {
                    // Initialize Firebase - FORCE LIVE CONFIG
                    // We ignore the environment variable here to ensure we connect to your real data
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    // Auth Listener
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        updateUIForUser();
                    });

                    // Router Listener
                    window.addEventListener("hashchange", handleRouting);

                    // Start Real-time Feed Listeners
                    setupFeedListeners();

                    // Initial Route
                    handleRouting();
                } catch (e) {
                    console.error("Init Error:", e);
                    document.getElementById("main-container").innerHTML =
                        `<div class="text-center text-red-500">System Error: ${e.message}</div>`;
                }
            }

            // --- DATA FETCHING (REAL-TIME SNAPSHOTS) ---
            function setupFeedListeners() {
                unifiedFeed = [...legacyArticles]; // Start with legacy

                // 1. CFOD Listener (Using standard collection name)
                const cfodRef = collection(db, "cfod_articles");

                unsubCfod = onSnapshot(
                    query(cfodRef, orderBy("createdAt", "desc"), limit(20)),
                    (snapshot) => {
                        // Filter out existing dynamic items before re-adding
                        unifiedFeed = unifiedFeed.filter(
                            (i) => i.type !== "dynamic",
                        );

                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            unifiedFeed.push({
                                id: doc.id,
                                type: "dynamic",
                                source: "Portfolio",
                                date: data.createdAt?.toDate
                                    ? data.createdAt.toDate().toISOString()
                                    : new Date().toISOString(),
                                imageUrl: data.imageUrl,
                                title: data.title,
                                description: data.summary,
                                content: data.content,
                                linkUrl: data.externalLink || null,
                            });
                        });
                        refreshFeed();
                    },
                    (error) => {
                        console.error("CFOD Feed Error:", error);
                        feedError = "Error loading CFOD posts: " + error.code;
                        refreshFeed();
                    },
                );

                // 2. JCJournal Listener (Using standard collection name)
                const jcRef = collection(db, "articles");

                unsubJc = onSnapshot(
                    query(jcRef, orderBy("createdAt", "desc"), limit(10)),
                    (snapshot) => {
                        unifiedFeed = unifiedFeed.filter(
                            (i) => i.type !== "external",
                        );

                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            unifiedFeed.push({
                                id: doc.id,
                                type: "external",
                                source: "JCJournal",
                                date: data.createdAt?.toDate
                                    ? data.createdAt.toDate().toISOString()
                                    : new Date().toISOString(),
                                imageUrl: data.imageUrl,
                                title: data.title,
                                description: data.summary,
                                linkUrl: `https://jcjournal.co.uk/#article/${doc.id}`,
                            });
                        });
                        refreshFeed();
                    },
                    (error) => {
                        console.error("JC Feed Error:", error);
                    },
                );
            }

            function refreshFeed() {
                unifiedFeed.sort((a, b) => new Date(b.date) - new Date(a.date));
                if (
                    currentView === "home" &&
                    (window.location.hash === "" ||
                        window.location.hash === "#")
                ) {
                    renderHome();
                }
            }

            // --- ROUTING & VIEWS ---
            function handleRouting() {
                const hash = window.location.hash;
                window.scrollTo(0, 0);

                if (hash === "" || hash === "#") {
                    currentView = "home";
                    renderHome();
                } else if (hash === "#login") {
                    currentView = "login";
                    renderLogin();
                } else if (hash === "#submit") {
                    currentView = "submit";
                    if (!currentUser) {
                        window.location.hash = "#login";
                        return;
                    }
                    renderSubmitForm();
                } else if (hash.startsWith("#article/")) {
                    currentView = "article";
                    const id = hash.split("/")[1];
                    renderArticleDetail(id);
                } else if (hash === "#logout") {
                    signOut(auth).then(() => (window.location.hash = ""));
                }
            }

            // --- VIEW: HOME GRID ---
            function renderHome() {
                const container = document.getElementById("main-container");

                const cardsHtml = unifiedFeed
                    .slice(0, displayedCount)
                    .map((item) => {
                        const badgeColor =
                            item.source === "JCJournal"
                                ? "bg-blue-100 text-blue-800"
                                : "bg-gray-100 text-gray-800";
                        const btnText =
                            item.source === "JCJournal"
                                ? "VISIT JOURNAL"
                                : "READ MORE";
                        const btnColor =
                            item.source === "JCJournal"
                                ? "bg-blue-700 hover:bg-blue-800"
                                : "bg-primary-600 hover:bg-primary-700";

                        let href = item.linkUrl;
                        let target = "";

                        if (item.type === "dynamic" && !item.linkUrl) {
                            href = `#article/${item.id}`;
                        } else if (
                            item.source === "JCJournal" ||
                            item.linkUrl?.startsWith("http")
                        ) {
                            target = 'target="_blank"';
                        }

                        return `
                <article class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden flex flex-col transition-all hover:shadow-lg hover:-translate-y-1 relative h-full">
                    <div class="absolute top-4 right-4 z-10">
                        <span class="${badgeColor} text-xs font-bold px-2 py-1 rounded border border-white/50 uppercase tracking-wide shadow-sm">${item.source}</span>
                    </div>
                    <div class="h-56 bg-gray-100 overflow-hidden relative">
                         <img src="${item.imageUrl || "https://placehold.co/600x400/EEE/31343C?text=No+Image"}"
                              class="w-full h-full object-cover"
                              alt="${item.title}"
                              onerror="this.src='https://placehold.co/600x400/EEE/31343C?text=Image+Error'">
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="text-xs text-gray-400 mb-2 font-mono">${new Date(item.date).toLocaleDateString()}</div>
                        <h2 class="text-xl font-bold mb-3 text-gray-900 leading-tight">${item.title}</h2>
                        <p class="text-gray-600 mb-6 flex-grow text-sm leading-relaxed">${item.description || "No description available."}</p>
                        <a href="${href}" ${target} class="inline-block w-full text-center ${btnColor} text-white font-bold text-xs py-3 px-4 rounded uppercase tracking-wider transition-colors">
                            ${btnText}
                        </a>
                    </div>
                </article>
                `;
                    })
                    .join("");

                let statusHtml = "";
                if (feedError) {
                    statusHtml = `<div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded mb-8 text-sm flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> ${feedError}</div>`;
                } else if (unifiedFeed.length === legacyArticles.length) {
                    statusHtml = `<div class="bg-blue-50 border border-blue-200 text-blue-600 px-4 py-3 rounded mb-8 text-sm">
                    <strong>Connected to Live Database.</strong> No additional posts found in 'articles' or 'cfod_articles'. Use "New Post" to create one.
                </div>`;
                }

                container.innerHTML = `
                <div class="flex justify-between items-end mb-8 fade-in">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">Latest Updates</h1>
                        <p class="text-gray-500 mt-1">Aggregated from across my network.</p>
                    </div>
                </div>
                ${statusHtml}
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in">
                    ${cardsHtml}
                </div>
                ${
                    unifiedFeed.length > displayedCount
                        ? `
                <div class="text-center mt-12">
                    <button onclick="window.displayedCount += 6; window.handleRouting()" class="text-gray-500 hover:text-black font-bold border-b-2 border-transparent hover:border-black transition-all">Load More Archives</button>
                </div>`
                        : ""
                }
            `;

                window.displayedCount = displayedCount;
                window.handleRouting = handleRouting;
            }

            // --- VIEW: ARTICLE READER ---
            function renderArticleDetail(id) {
                const item = unifiedFeed.find((i) => i.id === id);
                const container = document.getElementById("main-container");

                if (!item) {
                    container.innerHTML = `<div class="text-center py-20">Article not found. <a href="#" class="underline">Go Home</a></div>`;
                    return;
                }

                const formattedBody = item.content
                    ? item.content
                          .split("\n")
                          .map((line) => {
                              if (line.startsWith("## "))
                                  return `<h2>${line.replace("## ", "")}</h2>`;
                              if (line.startsWith("- "))
                                  return `<li>${line.replace("- ", "")}</li>`;
                              if (line.trim() === "") return "<br>";
                              return `<p>${line}</p>`;
                          })
                          .join("")
                    : "<p>No content provided.</p>";

                container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-white p-8 md:p-12 rounded-xl shadow-sm border border-gray-100 fade-in">
                    <a href="#" onclick="window.location.hash=''; return false;" class="inline-flex items-center text-xs font-bold text-gray-500 hover:text-black mb-8 uppercase tracking-wide">
                        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
                    </a>

                    <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-6 leading-tight">${item.title}</h1>

                    <div class="flex items-center text-sm text-gray-500 mb-8 pb-8 border-b border-gray-100">
                        <span>Published ${new Date(item.date).toLocaleDateString()}</span>
                        <span class="mx-2">•</span>
                        <span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold text-gray-700">Portfolio Update</span>
                    </div>

                    ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-auto rounded-lg mb-10 shadow-sm">` : ""}

                    <div class="prose max-w-none text-gray-800 text-lg">
                        <p class="font-bold text-xl mb-8 text-gray-900 italic">${item.description}</p>
                        ${formattedBody}
                    </div>
                </div>
            `;
            }

            // --- VIEW: SUBMIT FORM ---
            function renderSubmitForm() {
                const container = document.getElementById("main-container");
                container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200 fade-in">
                    <h2 class="text-2xl font-bold mb-6">Create New CFOD Post</h2>
                    <form id="cms-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Title</label>
                            <input type="text" id="p-title" required class="w-full p-3 border rounded bg-gray-50 focus:ring-2 focus:ring-black outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Image URL</label>
                            <input type="text" id="p-image" placeholder="https://..." class="w-full p-3 border rounded bg-gray-50 focus:ring-2 focus:ring-black outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Summary (Shown on card)</label>
                            <textarea id="p-summary" required rows="2" class="w-full p-3 border rounded bg-gray-50 focus:ring-2 focus:ring-black outline-none transition-all"></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded border border-gray-200">
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Option A: Write Article</label>
                                <textarea id="p-content" rows="6" placeholder="Write content here. Use '##' for headers." class="w-full p-3 border rounded bg-white focus:ring-2 focus:ring-black outline-none transition-all"></textarea>
                            </div>
                            <div class="flex flex-col justify-center border-l border-gray-200 pl-4">
                                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Option B: External Link</label>
                                <input type="text" id="p-link" placeholder="e.g. ./about-me.html" class="w-full p-3 border rounded bg-white focus:ring-2 focus:ring-black outline-none transition-all mb-2">
                                <p class="text-xs text-gray-400">If you fill this in, the card will link here INSTEAD of opening the article text.</p>
                            </div>
                        </div>

                        <div class="pt-4 flex justify-between items-center">
                            <a href="#" class="text-sm text-red-500 font-bold hover:underline">Cancel</a>
                            <button type="submit" class="bg-black text-white px-8 py-3 rounded font-bold hover:bg-gray-800 transition-transform active:scale-95">Publish Post</button>
                        </div>
                    </form>
                </div>
            `;

                document
                    .getElementById("cms-form")
                    .addEventListener("submit", async (e) => {
                        e.preventDefault();
                        const btn = e.target.querySelector("button");
                        btn.textContent = "Publishing...";
                        btn.disabled = true;

                        try {
                            const data = {
                                title: document.getElementById("p-title").value,
                                imageUrl:
                                    document.getElementById("p-image").value,
                                summary:
                                    document.getElementById("p-summary").value,
                                content:
                                    document.getElementById("p-content").value,
                                externalLink:
                                    document.getElementById("p-link").value,
                                createdAt: serverTimestamp(),
                                authorId: currentUser.uid,
                            };

                            const colRef = collection(db, "cfod_articles");
                            await addDoc(colRef, data);

                            alert("Posted successfully!");
                            window.location.hash = "";
                        } catch (err) {
                            alert("Error: " + err.message);
                            btn.textContent = "Publish Post";
                            btn.disabled = false;
                        }
                    });
            }

            // --- VIEW: LOGIN ---
            function renderLogin() {
                const container = document.getElementById("main-container");
                container.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200 mt-10 fade-in">
                    <h2 class="text-2xl font-bold mb-6 text-center">Staff Access</h2>
                    <form id="login-form" class="space-y-4">
                        <input type="email" id="email" placeholder="Email" required class="w-full p-3 border rounded bg-gray-50">
                        <input type="password" id="password" placeholder="Password" required class="w-full p-3 border rounded bg-gray-50">
                        <button type="submit" class="w-full bg-black text-white py-3 rounded font-bold">Login</button>
                    </form>
                    <p id="login-error" class="text-center text-red-500 text-sm mt-4"></p>
                </div>
            `;

                document
                    .getElementById("login-form")
                    .addEventListener("submit", async (e) => {
                        e.preventDefault();
                        const errorBox = document.getElementById("login-error");
                        errorBox.textContent = "";

                        try {
                            await signInWithEmailAndPassword(
                                auth,
                                document.getElementById("email").value,
                                document.getElementById("password").value,
                            );
                            window.location.hash = "";
                        } catch (err) {
                            let msg = err.message;
                            if (err.code === "auth/invalid-credential")
                                msg = "Incorrect email or password.";
                            errorBox.textContent = msg;
                        }
                    });
            }

            // --- UI HELPERS ---
            function updateUIForUser() {
                const authLinks = document.getElementById("auth-links");
                const newPostBtn = document.getElementById("new-post-btn");
                const badge = document.getElementById("admin-badge");

                if (currentUser) {
                    authLinks.innerHTML = `<a href="#logout" class="text-xs font-bold text-red-400 hover:text-red-600 uppercase transition-colors">Logout</a>`;
                    newPostBtn.classList.remove("hidden");
                    badge.classList.remove("hidden");
                } else {
                    authLinks.innerHTML = `<a href="#login" class="text-xs font-bold text-gray-500 hover:text-white uppercase transition-colors">Staff Login</a>`;
                    newPostBtn.classList.add("hidden");
                    badge.classList.add("hidden");
                }
            }

            init();
