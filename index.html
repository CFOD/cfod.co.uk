</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased">

            </div>
            <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-8">

            },
            {
                type: 'standard',
                imageUrl: './imgs/books_2.jpg',
                altText: 'Pile of books',
                title: 'Essay - "The Changing Nature of War"',
                description: 'Throughout the 21st century, video games, memes and social media have become a mainstream part of culture and society. With this comes a variety of complex issues...',
                linkUrl: './changing-nature-of-war.html',
                contentHtml: `

                    <p class="font-semibold text-gray-900 text-center mb-4">Critically consider the implications of warfare increasingly migrating to the extended battlefield of social media and video gaming.</p>
                `
            },
            {
                type: 'standard',
                imageUrl: './imgs/f35-image.jpg',
                altText: 'F35 Jet',
                title: 'World Hunger Story - in Progress',
                description: 'I feel the answer to this question can be answered both globally and in regard to the United States specifically. From some very rough calculations, around 1 in 10 people are experiencing hunger...',
                linkUrl: './world-hunger-story.html',
                contentHtml: `
                    <p class="text-sm italic text-center mb-4">The following article was written in response to a question given in an internship interview</p>
                `
            },
            {
                type: 'standard',
                imageUrl: './imgs/rishi_sunak.jpg',
                altText: 'Rishi Sunak',
                title: 'UK Political Uncertainty Ahead of 2024...',
                description: 'As the UK gears up for the 2024 general election, a recent article regarding a YouGov poll published by The Telegraph has ignited speculation about the potential shift in leadership...',
                linkUrl: './rishi-story.html',
                contentHtml: `
                    <p class="text-sm italic text-center mb-4">The following article serves as my initial submission as content writer/reporter for otb.news</p>
                `
            },
            {
                type: 'standard',
                imageUrl: 'https://placehold.co/600x400/9ca3af/FFF?text=Article+Image',
                altText: 'Pile of books',
                title: 'The English School - A 14 Day essay',
                description: 'This essay will argue the core elements of the English School’s approach to International Relations (IR), how they are based around and emphasise social cooperation...',
                linkUrl: './english-school.html',
                contentHtml: `
                    <p class="text-sm italic mb-2">This essay served as a significant milestone in my pursuit of a Master's degree... within a strict 14-day timeframe...</p>
                    <p class="font-semibold text-gray-900 text-center mb-4">What are the core elements of the English School’s approach to IR? How, if at all, does it differ from realism?</p>
                `
            },
            {
                type: 'table', // Special type for the wide table card
                imageUrl: 'https://placehold.co/800x400/9ca3af/FFF?text=Pacific+Islands+Map',
                altText: 'Map of pacific islands',
                title: 'Pacific island cup 2024',
                description: 'The Pacific Island Cup 2024 is a personal endeavor born out of interest in Geography, Politics, Flags and History. After receiving exposure to nations within the Pacific through informal means, I have created a personal ranking system based on subjective factors, such as independence, location, rating looks and island usage.',
                linkUrl: './pacific-cup.html',
                colSpan: 'md:col-span-2 lg:col-span-3', // Special class for this card
                contentHtml: `
                    <div class="table-responsive rounded-lg border mb-6">
                        <table class="min-w-full divide-y divide-gray-200">

                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr><td class="px-6 py-4">Kiribati</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.85</td><td class="px-6 py-4">1</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.8</td><td class="px-6 py-4">0</td><td class="px-6 py-4 font-bold">4.65</td></tr>
                                <tr><td class="px-6 py-4">The Marshall Islands</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.85</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.6</td><td class="px-6 py-4">0.6</td><td class="px-6 py-4">0</td><td class="px-6 py-4 font-bold">4.05</td></tr>
                                <tr><td class="px-6 py-4">Palau</td><td class="px-6 py-4">1</td><td class="px-6 py-4">1</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.2</td><td class="px-6 py-4">0.6</td><td class="px-6 py-4">0</td><td class="px-6 py-4 font-bold">3.8</td></tr>
                                <tr><td class="px-6 py-4">Micronesia</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.8</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.45</td><td class="px-6 py-4">0.4</td><td class="px-6 py-4">0</td><td class="px-6 py-4 font-bold">3.65</td></tr>
                                <tr><td class="px-6 py-4">Tuvalu</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.15</td><td class="px-6 py-4">1</td><td class="px-6 py-4">0.6</td><td class="px-6 py-4">0.5</td><td class="px-6 py-4">0</td><td class="px-6 py-4 font-bold">3.25</td></tr>
                            </tbody>
                        </table>
                    </div>
                `
            },
            // --- DUMMY ARTICLES TO SHOW PAGINATION ---
            // You can remove these and add your own
            {
                type: 'standard',
                imageUrl: 'https://placehold.co/600x400/6b7280/FFF?text=Dummy+Article+1',
                altText: 'Dummy Article',
                title: 'This is a New Dummy Article',
                description: 'This article was loaded dynamically. Add as many as you want to the `allArticles` list, and the "Load More" button will handle them.',
                linkUrl: '#',
                contentHtml: ''
            },
            {
                type: 'standard',
                imageUrl: 'https://placehold.co/600x400/6b7280/FFF?text=Dummy+Article+2',
                altText: 'Dummy Article',
                title: 'Another Article Post',
                description: 'This is the eighth article in the list. The button will load this and the next one, and then disappear since there are no more to load.',
                linkUrl: '#',
                contentHtml: ''
            },
            {
                type: 'standard',
                imageUrl: 'https://placehold.co/600x400/6b7280/FFF?text=Dummy+Article+3',
                altText: 'Dummy Article',
                title: 'The Final Dummy Post',
                description: 'Once this post is loaded, the "Load More" button will be hidden automatically because the end of the `allArticles` list has been reached.',
                linkUrl: '#',
                contentHtml: ''
            }
        ];

        // --- ARTICLE LOADING LOGIC ---
        const articlesPerLoad = 6;
        let articlesLoaded = 0;
        const articleGrid = document.getElementById('article-grid');
        const loadMoreBtn = document.getElementById('load-more-btn');

        function generateArticleHtml(article) {
            const colSpanClass = article.colSpan || '';
            let contentHtml = '';
            let descriptionHtml = `<p class="text-gray-700 mb-4 flex-grow">${article.description}</p>`;
            let linkClass = 'inline-block mt-auto bg-primary-600 text-white font-medium py-2 px-4 rounded-lg text-center hover:bg-primary-700 transition-colors';

            if (article.type === 'standard') {
                contentHtml = article.contentHtml || '';
            } else if (article.type === 'table') {
                descriptionHtml = `<p class="text-gray-700 mb-6">${article.description}</p>`;
                contentHtml = article.contentHtml || '';
                linkClass += ' w-full md:w-auto md:self-start'; // Special class for the table card's button
            }

            return `
                <section class="bg-white rounded-lg shadow-lg overflow-hidden flex flex-col transition-transform duration-300 hover:scale-[1.02] ${colSpanClass}">
                    <img class="h-56 w-full object-cover" src="${article.imageUrl}" alt="${article.altText}">
                    <div class="p-6 flex-grow flex flex-col">
                        <h2 class="text-2xl font-bold mb-3 text-gray-900">${article.title}</h2>
                        <div class="text-gray-700 mb-4 flex-grow">
                            ${contentHtml}
                            ${descriptionHtml}
                        </div>
                        <a href="${article.linkUrl}" class="${linkClass}">READ MORE</a>
                    </div>
                </section>
            `;
        }

        function loadArticles() {
            const articlesToLoad = allArticles.slice(articlesLoaded, articlesLoaded + articlesPerLoad);
            
            articlesToLoad.forEach(article => {
                const articleHtml = generateArticleHtml(article);
                articleGrid.innerHTML += articleHtml;
            });

            articlesLoaded += articlesToLoad.length;

            // Hide button if no more articles
            if (articlesLoaded >= allArticles.length) {
                loadMoreBtn.style.display = 'none';
            }
        }

        // Load initial articles
        document.addEventListener('DOMContentLoaded', loadArticles);

        // Load more on button click
        loadMoreBtn.addEventListener('click', loadArticles);

    </script>

</body>
</html>
