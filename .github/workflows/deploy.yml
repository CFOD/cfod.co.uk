name: Deploy Website
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # STEP 1: Deploy MAIN SITE (Root)
    # ---------------------------------------------------------
    - name: 📂 Sync Main Site to HTDocs
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        security: loose
        timeout: 60000
        local-dir: ./
        server-dir: /htdocs/
        exclude: |
          **/.git/**
          **/.git*
          **/.github/**
          mw2/**
          newsletter/**
          node_modules/**
          tools/**

    # ---------------------------------------------------------
    # STEP 2: Deploy MW2 Subdomain
    # ---------------------------------------------------------
    - name: 📂 Sync MW2 to Subdomain Folder
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        security: loose
        timeout: 60000
        local-dir: ./mw2/
        server-dir: /mw2.cfod.co.uk/htdocs/
        exclude: |
          **/.git/**
          **/.git*

    # ---------------------------------------------------------
    # STEP 3: Deploy NEWSLETTER Subdomain
    # ---------------------------------------------------------
    - name: 📂 Sync Newsletter to Subdomain Folder
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        security: loose
        timeout: 60000
        local-dir: ./newsletter/
        server-dir: /newsletter.cfod.co.uk/htdocs/
        exclude: |
          **/.git/**
          **/.git*
